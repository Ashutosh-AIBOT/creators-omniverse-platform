{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'testprofiles/delete_item.css' %}">

<div class="delete-item-page">
  <h2>Delete Link Item</h2>
  <p class="delete-warning">
    Are you sure you want to delete <strong>"{{ item.title }}"</strong>?
  </p>

  <form method="post" class="delete-form">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn delete-btn">Confirm Delete</button>
      <a href="{% url 'testprofiles:profile' request.user.username %}" class="btn cancel-btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
