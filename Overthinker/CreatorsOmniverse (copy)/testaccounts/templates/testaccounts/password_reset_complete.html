{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'testaccounts/password_reset_complete.css' %}">

<div class="auth-page">

  <div class="auth-card">

    <h2 class="auth-title">Password Reset Successful</h2>
    <p class="auth-subtitle">
      Your password has been updated successfully. You can now log in using your new credentials.
    </p>

    <a href="{% url 'testaccounts:login' %}" class="btn-auth">
      Go to Login
    </a>

    <div class="auth-quote">
      <p>
        “A fresh start begins with secure access.”
      </p>
    </div>

  </div>

</div>
{% endblock %}
