{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'testaccounts/password_reset.css' %}">

<div class="auth-page">

  <div class="auth-card">

    <h2 class="auth-title">Reset Your Password</h2>
    <p class="auth-subtitle">
      Enter your email and we’ll send you instructions to reset your password.
    </p>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-auth">Send Reset Email</button>
    </form>

    <div class="auth-quote">
      <p>
        “Security is not a product, but a process.”
      </p>
    </div>

  </div>

</div>
{% endblock %}
