{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
    .create-group-container {
        max-width: 600px;
        margin: 50px auto;
        background: white;
        padding: 50px;
        border-radius: 20px;
        border: 1px solid #eee;
    }
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 10px; }
    .form-control { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
    .btn-submit { background: #4f46e5; color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
</style>

<div class="create-group-container">
    <h1 style="font-weight: 800; margin-bottom: 30px;">Create Community</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Group Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. AI Researchers" required>
        </div>
        <div class="form-group">
            <label>Privacy Setting</label>
            <select name="privacy" id="privacy-select" class="form-control" onchange="togglePassword()">
                <option value="public">Public (Anyone can join via ID)</option>
                <option value="private">Private (Requires Password to join)</option>
            </select>
        </div>
        <div class="form-group" id="password-group" style="display: none;">
            <label>Group Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create a secure password">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" style="height: 100px;"></textarea>
        </div>
        <button type="submit" class="btn-submit">Initialize Community</button>
    </form>
</div>

<script>
    function togglePassword() {
        const privacy = document.getElementById('privacy-select').value;
        const passwordGroup = document.getElementById('password-group');
        passwordGroup.style.display = privacy === 'private' ? 'block' : 'none';
    }
</script>
{% endblock %}
