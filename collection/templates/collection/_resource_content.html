<div class="container">
    <h1 class="topic-title">{{ topic_obj.name }} Resources</h1>
    <div class="topic-underline"></div>
    {% for section in topic_obj.sections.all %}
    <section>
        <h2>{{ section.title }}</h2>
        <ul>
            {% for link in section.links.all %}
            <li><a href="{{ link.url }}" target="_blank">{{ link.title }}</a></li>
            {% endfor %}
        </ul>
    </section>
    {% empty %}
    <p>No resources found for this topic yet. Check back soon!</p>
    {% endfor %}
</div>
