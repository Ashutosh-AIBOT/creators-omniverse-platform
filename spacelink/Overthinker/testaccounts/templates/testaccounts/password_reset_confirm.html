{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'testaccounts/password_reset_confirm.css' %}">

<div class="auth-page">

  <div class="auth-card">

    <h2 class="auth-title">Set a New Password</h2>
    <p class="auth-subtitle">
      Choose a strong password to secure your account.
    </p>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-auth">Reset Password</button>
    </form>

    <div class="auth-quote">
      <p>
        “Strong passwords build strong foundations.”
      </p>
    </div>

  </div>

</div>
{% endblock %}
