{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'testaccounts/login.css' %}">

<section class="auth-page">
  <div class="auth-card">

    <h1 class="auth-title">Welcome Back 👋</h1>
    <p class="auth-subtitle">
      “Discipline beats motivation when motivation fades.”
    </p>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="btn-login">
        Login →
      </button>
    </form>

    <div class="auth-links">
      <a href="{% url 'testaccounts:password_reset' %}">
        Forgot password?
      </a>
    </div>

    <div class="auth-quote">
      <p>
        “Your future needs you focused, not stressed.”
      </p>
    </div>

  </div>
</section>
{% endblock %}
